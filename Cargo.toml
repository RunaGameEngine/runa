[workspace]
members = [
    "crates/runa_core",
    "crates/runa_render",
    "crates/runa_asset",
    "crates/runa_hub",
    "crates/runa_editor",
    "crates/runa_render_api",
    "examples/sandbox",
    "crates/runa_hub",
]
resolver = "2"

[workspace.package]
version = "0.0.0"
authors = ["Your Name <you@example.com>"]
edition = "2021"
license = ""
repository = "https://github.com/AnuranGames/runa-engine"
description = "2D/3D game engine in Rust"

[workspace.dependencies]
winit = { version = "0.30.12" }
pollster = { version = "0.4" }
wgpu = { version = "28.0.0" }
glam = { version = "0.32.0" }
